<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Designs By Dave O. — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #111318; font-size: 15px; }

/* Top header bar */
.top-bar { position: fixed; top: 0; left: 0; right: 0; height: 40px; background: #111318; color: #9ca3af; display: flex; align-items: center; padding: 0 20px; font-size: 12px; z-index: 100; gap: 24px; overflow: hidden; }
.top-bar .stock { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.top-bar .stock .sym { color: #e5e7eb; font-weight: 600; }
.top-bar .stock .price { color: #fff; }
.top-bar .stock .up { color: #10b981; }
.top-bar .stock .down { color: #ef4444; }
.top-bar .weather { display: flex; align-items: center; gap: 4px; color: #e5e7eb; margin-left: auto; }
.top-bar .status { display: flex; align-items: center; gap: 6px; }
.top-bar .status .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }
.top-bar .time { color: #e5e7eb; font-weight: 500; }

/* Sidebar */
.sidebar { position: fixed; left: 0; top: 40px; bottom: 0; width: 240px; background: #111318; color: #fff; padding: 16px 0; overflow-y: auto; z-index: 90; }
.sidebar .brand { padding: 4px 20px 20px; border-bottom: 1px solid #2a2d35; display: flex; align-items: center; gap: 10px; }
.sidebar .brand-icon { width: 36px; height: 36px; background: #f5c542; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #111318; }
.sidebar .brand-name { font-size: 14px; font-weight: 700; line-height: 1.2; }
.sidebar .brand-sub { font-size: 11px; color: #6b7280; }
.nav-item { display: flex; align-items: center; padding: 12px 20px; color: #9ca3af; text-decoration: none; transition: all .2s; cursor: pointer; font-size: 14px; gap: 10px; }
.nav-item:hover, .nav-item.active { background: #1e2028; color: #fff; }
.nav-item.active { border-right: 3px solid #f5c542; }

/* Main content */
.main { margin-left: 240px; margin-top: 40px; padding: 24px; min-height: calc(100vh - 40px); }
.header { margin-bottom: 24px; }
.header h2 { font-size: 24px; font-weight: 700; }
.header p { color: #6b7280; margin-top: 4px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-card .label { font-size: 13px; color: #6b7280; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .value.gold { color: #d4a017; }
.dash-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }

/* ===== MONOPOLY PROPERTY CARDS ===== */
.people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.monopoly-card { background: #fffef8; border: 2px solid #1a1a2e; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 12px rgba(0,0,0,.12); transition: transform .15s, box-shadow .15s; position: relative; }
.monopoly-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.18); }
.monopoly-band { height: 32px; width: 100%; }
.monopoly-band.retainer { background: #1e40af; }
.monopoly-band.project { background: #d4a017; }
.monopoly-band.lead { background: #6d28d9; }
.monopoly-band.contact { background: #059669; }
.monopoly-band.active { background: #1e40af; }
.monopoly-body { padding: 14px 16px 16px; }
.monopoly-title { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; text-align: center; margin-bottom: 10px; color: #1a1a2e; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
.monopoly-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.monopoly-badge.retainer { background: #dbeafe; color: #1e40af; }
.monopoly-badge.project { background: #fef3c7; color: #92400e; }
.monopoly-badge.lead { background: #ede9fe; color: #5b21b6; }
.monopoly-badge.contact { background: #d1fae5; color: #065f46; }
.monopoly-badge.active { background: #dbeafe; color: #1e40af; }
.monopoly-detail { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px dotted #ccc; color: #444; }
.monopoly-detail:last-child { border-bottom: none; }
.monopoly-detail .md-label { font-weight: 600; color: #666; }
.monopoly-value-bar { text-align: center; margin-top: 10px; padding-top: 8px; border-top: 2px solid #1a1a2e; }
.monopoly-value-bar .mv-amount { font-size: 18px; font-weight: 800; color: #1a1a2e; }
.monopoly-value-bar .mv-label { font-size: 10px; color: #888; text-transform: uppercase; }

/* People filter tabs */
.filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-tab { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
.filter-tab:hover { border-color: #999; }
.filter-tab.active { background: #111318; color: #fff; border-color: #111318; }

/* ===== CALENDAR GRID ===== */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-header h3 { font-size: 18px; font-weight: 700; margin: 0; padding: 0; border: none; }
.cal-nav { display: flex; gap: 8px; align-items: center; }
.cal-nav button { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
.cal-nav button:hover { background: #111318; color: #fff; }
.cal-nav .cal-range { font-size: 14px; font-weight: 600; min-width: 200px; text-align: center; }
.cal-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: #fff; }
.cal-day-header { background: #f9fafb; padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb; border-left: 1px solid #e5e7eb; }
.cal-day-header.today { background: #fef3c7; color: #92400e; }
.cal-time-label { background: #f9fafb; padding: 2px 6px; font-size: 10px; color: #6b7280; text-align: right; border-bottom: 1px solid #f3f4f6; border-right: 1px solid #e5e7eb; height: 48px; display: flex; align-items: flex-start; justify-content: flex-end; }
.cal-cell { border-bottom: 1px solid #f3f4f6; border-left: 1px solid #f3f4f6; height: 48px; position: relative; }
.cal-cell.today-col { background: #fffde7; }
.cal-event { position: absolute; left: 2px; right: 2px; background: #3b82f6; color: #fff; font-size: 10px; font-weight: 500; padding: 2px 4px; border-radius: 4px; overflow: hidden; cursor: default; z-index: 2; line-height: 1.2; }
.cal-event.long { background: #8b5cf6; }
.cal-corner { background: #f9fafb; border-bottom: 1px solid #e5e7eb; }

/* ===== TASKS GROUPED ===== */
.task-group { background: #fff; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
.task-group-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; cursor: pointer; user-select: none; background: #fafafa; border-bottom: 1px solid #e5e7eb; transition: background .15s; }
.task-group-header:hover { background: #f3f4f6; }
.task-group-header .tg-name { font-weight: 700; font-size: 15px; }
.task-group-header .tg-count { background: #e5e7eb; color: #374151; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
.task-group-header .tg-arrow { transition: transform .2s; font-size: 12px; color: #6b7280; }
.task-group-header.collapsed .tg-arrow { transform: rotate(-90deg); }
.task-group-body { padding: 4px 0; }
.task-group-body.hidden { display: none; }
.task-row { display: flex; align-items: center; padding: 10px 20px; border-bottom: 1px solid #f3f4f6; gap: 10px; }
.task-row:last-child { border-bottom: none; }
.task-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #d1d5db; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.task-check:hover { border-color: #10b981; }
.task-check.done { background: #10b981; border-color: #10b981; }
.task-check.done::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
.task-name { flex: 1; font-size: 14px; }
.task-name.completed { text-decoration: line-through; color: #9ca3af; }
.task-priority { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.task-priority.p4 { background: #ef4444; }
.task-priority.p3 { background: #f59e0b; }
.task-priority.p2 { background: #3b82f6; }
.task-priority.p1 { background: #d1d5db; }
.task-due { font-size: 12px; color: #6b7280; white-space: nowrap; }
.task-due.overdue { color: #ef4444; font-weight: 600; }

.section { display: none; }
.section.active { display: block; }
#loading { text-align: center; padding: 60px; font-size: 18px; color: #6b7280; }
.task-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
.task-item:last-child { border-bottom: none; }
.task-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
.task-dot.red { background: #ef4444; }
.task-dot.yellow { background: #f59e0b; }
.task-dot.blue { background: #3b82f6; }
.event-item { padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
.event-item:last-child { border-bottom: none; }
.event-time { font-size: 12px; color: #6b7280; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.active { background: #d1fae5; color: #065f46; }

@media (max-width: 768px) {
  .sidebar { width: 60px; } .sidebar .brand-name, .sidebar .brand-sub, .nav-text { display: none; }
  .main { margin-left: 60px; } .dash-cards { grid-template-columns: 1fr; }
  .top-bar { font-size: 10px; gap: 12px; }
  .people-grid { grid-template-columns: 1fr; }
  .cal-grid { font-size: 10px; }
}
</style>
</head>
<body>

<!-- Top Header Bar -->
<div class="top-bar">
  <div id="ticker" style="display:flex;gap:24px;align-items:center;overflow:hidden;flex:1"></div>
  <div class="weather" id="weather-bar">☁️ —</div>
  <div class="status"><div class="dot"></div> Online</div>
  <div class="time" id="clock"></div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="brand">
    <div class="brand-icon">D</div>
    <div>
      <div class="brand-name">Designs By Dave O.</div>
      <div class="brand-sub">Agency CRM</div>
    </div>
  </div>
  <a class="nav-item active" data-page="dashboard">📊 <span class="nav-text">Dashboard</span></a>
  <a class="nav-item" data-page="people">👥 <span class="nav-text">People</span></a>
  <a class="nav-item" data-page="tasks">✅ <span class="nav-text">Tasks</span></a>
  <a class="nav-item" data-page="calendar">📅 <span class="nav-text">Calendar</span></a>
</div>

<!-- Main Content -->
<div class="main">
  <div id="loading">Loading CRM data...</div>
  <div id="content" style="display:none">

    <!-- DASHBOARD -->
    <div class="section active" id="page-dashboard">
      <div class="header">
        <h2>Dashboard</h2>
        <p>Welcome back, David</p>
      </div>
      <div class="stats" id="stats-grid"></div>
      <div class="dash-cards">
        <div class="card"><h3>📋 Active Tasks</h3><div id="tasks-list"></div></div>
        <div class="card"><h3>📅 Upcoming Events</h3><div id="events-list"></div></div>
      </div>
      <div class="dash-cards">
        <div class="card"><h3>👥 Recent Clients</h3><div id="clients-preview" class="people-grid" style="padding-top:8px"></div></div>
      </div>
    </div>

    <!-- PEOPLE (merged clients + contacts) -->
    <div class="section" id="page-people">
      <div class="header"><h2>People</h2><p id="people-count"></p></div>
      <div class="filter-tabs" id="people-filters">
        <div class="filter-tab active" data-filter="all">All</div>
        <div class="filter-tab" data-filter="retainer">Retainer</div>
        <div class="filter-tab" data-filter="project">Project</div>
        <div class="filter-tab" data-filter="lead">Lead</div>
        <div class="filter-tab" data-filter="contact">Contact</div>
      </div>
      <div class="people-grid" id="people-grid"></div>
    </div>

    <!-- TASKS -->
    <div class="section" id="page-tasks">
      <div class="header"><h2>Tasks</h2><p id="task-summary"></p></div>
      <div id="tasks-grouped"></div>
    </div>

    <!-- CALENDAR -->
    <div class="section" id="page-calendar">
      <div class="cal-header">
        <h3>📅 Calendar</h3>
        <div class="cal-nav">
          <button id="cal-prev">← Prev</button>
          <span class="cal-range" id="cal-range"></span>
          <button id="cal-next">Next →</button>
          <button id="cal-today">Today</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

  </div>
</div>

<script>
const API = '/api';
let TOKEN = '';
let allEvents = [];
let calWeekOffset = 0;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'America/New_York' }) +
    ' · ' + now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'America/New_York' });
}
updateClock(); setInterval(updateClock, 30000);

// Stock ticker
async function loadTicker() {
  try {
    const r = await fetch(API + '/stocks');
    const stocks = await r.json();
    document.getElementById('ticker').innerHTML = stocks.map(s => {
      const chg = parseFloat(s.change);
      const cls = isNaN(chg) || chg === 0 ? '' : (chg > 0 ? 'up' : 'down');
      const arrow = isNaN(chg) || chg === 0 ? '' : (chg > 0 ? '↑' : '↓');
      const pct = isNaN(chg) ? '' : Math.abs(chg).toFixed(2) + '%';
      return '<div class="stock"><span class="sym">'+s.symbol+'</span> <span class="price">$'+s.price+'</span> <span class="'+cls+'">'+arrow+pct+'</span></div>';
    }).join('');
  } catch(e) {}
}
loadTicker(); setInterval(loadTicker, 60000);

// Weather
async function loadWeather() {
  try {
    const r = await fetch(API + '/weather');
    const w = await r.json();
    document.getElementById('weather-bar').textContent = '☁️ ' + w.temp + ' ' + w.desc;
  } catch(e) {}
}
loadWeather();

// ===== Monopoly Card Builder =====
function buildMonopolyCard(person) {
  const type = (person.type || person.category || 'contact').toLowerCase();
  const name = person.name || person.display_name || 'Unknown';
  const email = person.contact_email || person.email || '';
  const phone = person.phone || '';
  const value = person.monthly_value;
  const lastAct = person.last_activity;
  const bandClass = type === 'retainer' ? 'retainer' : type === 'project' ? 'project' : type === 'lead' ? 'lead' : type === 'active' ? 'active' : 'contact';

  let detailsHTML = '';
  if (email) detailsHTML += '<div class="monopoly-detail"><span class="md-label">Email</span><span>'+email+'</span></div>';
  if (phone) detailsHTML += '<div class="monopoly-detail"><span class="md-label">Phone</span><span>'+phone+'</span></div>';
  if (lastAct) detailsHTML += '<div class="monopoly-detail"><span class="md-label">Last Active</span><span>'+lastAct+'</span></div>';
  if (person.status) detailsHTML += '<div class="monopoly-detail"><span class="md-label">Status</span><span>'+person.status+'</span></div>';

  let valueHTML = '';
  if (value && value > 0) {
    valueHTML = '<div class="monopoly-value-bar"><div class="mv-label">Monthly Value</div><div class="mv-amount">$'+Number(value).toLocaleString()+'</div></div>';
  }

  return '<div class="monopoly-card" data-type="'+bandClass+'">' +
    '<div class="monopoly-band '+bandClass+'"></div>' +
    '<div class="monopoly-body">' +
      '<div style="text-align:center;margin-bottom:4px"><span class="monopoly-badge '+bandClass+'">'+bandClass+'</span></div>' +
      '<div class="monopoly-title">'+name+'</div>' +
      detailsHTML +
      valueHTML +
    '</div></div>';
}

// ===== Calendar Grid Builder =====
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function renderCalendar() {
  const now = new Date();
  const monday = getMonday(now);
  monday.setDate(monday.getDate() + calWeekOffset * 7);

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const todayStr = now.toDateString();
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const startHour = 8, endHour = 18;

  // Range label
  const fmt = (d) => d.toLocaleDateString('en-US', {month:'short',day:'numeric'});
  document.getElementById('cal-range').textContent = fmt(days[0]) + ' — ' + fmt(days[6]) + ', ' + days[0].getFullYear();

  let html = '<div class="cal-corner"></div>';
  days.forEach((d,i) => {
    const isToday = d.toDateString() === todayStr;
    html += '<div class="cal-day-header'+(isToday?' today':'')+'">'+dayNames[i]+'<br>'+d.getDate()+'</div>';
  });

  for (let h = startHour; h < endHour; h++) {
    const label = h === 0 ? '12 AM' : h < 12 ? h+' AM' : h === 12 ? '12 PM' : (h-12)+' PM';
    html += '<div class="cal-time-label">'+label+'</div>';
    days.forEach(d => {
      const isToday = d.toDateString() === todayStr;
      html += '<div class="cal-cell'+(isToday?' today-col':'')+'" data-day="'+d.toDateString()+'" data-hour="'+h+'"></div>';
    });
  }

  document.getElementById('cal-grid').innerHTML = html;

  // Place events
  (allEvents || []).forEach(evt => {
    const start = evt.start?.dateTime ? new Date(evt.start.dateTime) : (evt.start?.date ? new Date(evt.start.date + 'T09:00:00') : null);
    if (!start) return;
    const end = evt.end?.dateTime ? new Date(evt.end.dateTime) : (evt.end?.date ? new Date(evt.end.date + 'T10:00:00') : null);
    const dayStr = start.toDateString();

    const sh = start.getHours() + start.getMinutes()/60;
    const eh = end ? end.getHours() + end.getMinutes()/60 : sh + 1;
    if (sh >= endHour || eh <= startHour) return;

    const clampStart = Math.max(sh, startHour);
    const clampEnd = Math.min(eh, endHour);
    const topOffset = (clampStart - startHour) * 48;
    const height = Math.max((clampEnd - clampStart) * 48, 20);

    // find matching cell column
    const cells = document.querySelectorAll('.cal-cell[data-day="'+dayStr+'"]');
    if (!cells.length) return;
    const baseCell = cells[0]; // first cell in column
    const parent = baseCell.parentElement;

    // Actually place in the first cell of that day column
    const hourIndex = Math.floor(clampStart) - startHour;
    const targetCell = cells[Math.min(hourIndex, cells.length-1)];
    if (!targetCell) return;

    const evDiv = document.createElement('div');
    evDiv.className = 'cal-event' + ((eh - sh > 2) ? ' long' : '');
    evDiv.style.top = ((clampStart - Math.floor(clampStart)) * 48) + 'px';
    evDiv.style.height = height + 'px';
    evDiv.textContent = evt.summary || 'Event';
    evDiv.title = (evt.summary || '') + '\n' + start.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ' - ' + (end ? end.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '');
    targetCell.style.position = 'relative';
    targetCell.appendChild(evDiv);
  });
}

// ===== Tasks Grouped Builder =====
function renderGroupedTasks(tasks) {
  const groups = {};
  (tasks || []).forEach(t => {
    const proj = t.project_name || 'No Project';
    if (!groups[proj]) groups[proj] = [];
    groups[proj].push(t);
  });

  // Sort: projects with incomplete tasks first
  const projNames = Object.keys(groups).sort((a,b) => {
    const aInc = groups[a].filter(t=>!t.is_completed).length;
    const bInc = groups[b].filter(t=>!t.is_completed).length;
    return bInc - aInc;
  });

  const todayStr = new Date().toISOString().split('T')[0];
  let totalOpen = 0;
  let html = '';

  projNames.forEach(proj => {
    const items = groups[proj];
    const open = items.filter(t=>!t.is_completed).length;
    totalOpen += open;
    // Sort: incomplete first, then by priority desc
    items.sort((a,b) => {
      if (a.is_completed !== b.is_completed) return a.is_completed ? 1 : -1;
      return (b.priority||1) - (a.priority||1);
    });

    html += '<div class="task-group">';
    html += '<div class="task-group-header" onclick="this.classList.toggle(\'collapsed\');this.nextElementSibling.classList.toggle(\'hidden\')">';
    html += '<span><span class="tg-arrow">▼</span> <span class="tg-name">'+proj+'</span></span>';
    html += '<span class="tg-count">'+open+' open / '+items.length+' total</span>';
    html += '</div>';
    html += '<div class="task-group-body">';

    items.forEach(t => {
      const p = t.priority || 1;
      const dueDate = t.due?.date || '';
      const overdue = dueDate && dueDate < todayStr && !t.is_completed;
      html += '<div class="task-row">';
      html += '<div class="task-check'+(t.is_completed?' done':'')+'"></div>';
      html += '<div class="task-priority p'+p+'" title="Priority '+p+'"></div>';
      html += '<span class="task-name'+(t.is_completed?' completed':'')+'">'+t.content+'</span>';
      if (dueDate) html += '<span class="task-due'+(overdue?' overdue':'')+'">'+dueDate+'</span>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  document.getElementById('tasks-grouped').innerHTML = html || '<p style="color:#6b7280;padding:20px">No tasks</p>';
  document.getElementById('task-summary').textContent = totalOpen + ' open tasks across ' + projNames.length + ' projects';
}

// ===== CRM Data Init =====
async function init() {
  try {
    const res = await fetch(API + '/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password:'Oralevich101!'}) });
    const data = await res.json();
    TOKEN = data.token || '';
  } catch(e) {}

  const headers = TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {};
  const get = async (path) => {
    try {
      const r = await fetch(API + path, { headers });
      const ct = r.headers.get('content-type') || '';
      if (ct.includes('json')) return r.json();
    } catch(e) {}
    try { const r2 = await fetch('/data' + path + '.json'); if(r2.ok) return r2.json(); } catch(e) {}
    return null;
  };

  const [stats, clients, tasks, events, contacts] = await Promise.all([
    get('/dashboard/stats'), get('/clients'), get('/tasks'), get('/calendar'), get('/contacts')
  ]);

  allEvents = events || [];

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Stats
  const totalClients = stats?.total_clients || (clients||[]).length;
  const activeProjects = stats?.active_projects || 0;
  const openTasks = (tasks||[]).filter(t=>!t.is_completed).length;
  const eventsToday = stats?.meetings_today || 0;
  document.getElementById('stats-grid').innerHTML = [
    { label: 'Total Clients', value: totalClients, gold: true },
    { label: 'Active Projects', value: activeProjects },
    { label: 'Open Tasks', value: openTasks },
    { label: 'Events Today', value: eventsToday },
  ].map(s => '<div class="stat-card"><div class="label">'+s.label+'</div><div class="value'+(s.gold?' gold':'')+'">'+s.value+'</div></div>').join('');

  // Dashboard tasks preview
  const taskPreviewHTML = (tasks||[]).filter(t=>!t.is_completed).slice(0,8).map(t =>
    '<div class="task-item"><div class="task-dot '+(t.priority==4?'red':t.priority==3?'yellow':'blue')+'"></div><div><div>'+t.content+'</div><div style="font-size:12px;color:#6b7280">'+(t.project_name||'')+'</div></div></div>'
  ).join('') || '<p style="color:#6b7280;padding:8px 0">No tasks</p>';
  document.getElementById('tasks-list').innerHTML = taskPreviewHTML;

  // Dashboard events preview
  const eventPreviewHTML = (events||[]).slice(0,5).map(e =>
    '<div class="event-item"><div>'+e.summary+'</div><div class="event-time">'+(e.start?.dateTime ? new Date(e.start.dateTime).toLocaleString() : e.start?.date || '')+'</div></div>'
  ).join('') || '<p style="color:#6b7280;padding:8px 0">No events</p>';
  document.getElementById('events-list').innerHTML = eventPreviewHTML;

  // Dashboard client preview (mini monopoly cards, first 6)
  document.getElementById('clients-preview').innerHTML = (clients||[]).slice(0,6).map(c => buildMonopolyCard(c)).join('');

  // ===== PEOPLE PAGE (merged clients + contacts) =====
  const allPeople = [];
  (clients||[]).forEach(c => allPeople.push({...c, _source: 'client'}));
  (contacts||[]).forEach(c => {
    // Avoid duplicates by email
    const email = c.email || '';
    if (email && allPeople.find(p => (p.contact_email||p.email||'').toLowerCase() === email.toLowerCase())) return;
    allPeople.push({...c, type: c.category || 'contact', _source: 'contact'});
  });

  document.getElementById('people-count').textContent = allPeople.length + ' people';
  const renderPeople = (filter) => {
    const filtered = filter === 'all' ? allPeople : allPeople.filter(p => (p.type||'contact').toLowerCase() === filter);
    document.getElementById('people-grid').innerHTML = filtered.map(p => buildMonopolyCard(p)).join('') || '<p style="color:#6b7280;padding:20px">No people match this filter</p>';
  };
  renderPeople('all');

  document.querySelectorAll('#people-filters .filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('#people-filters .filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderPeople(tab.dataset.filter);
    });
  });

  // ===== TASKS PAGE =====
  renderGroupedTasks(tasks);

  // ===== CALENDAR PAGE =====
  renderCalendar();
}

// Calendar navigation
document.getElementById('cal-prev').addEventListener('click', () => { calWeekOffset--; renderCalendar(); });
document.getElementById('cal-next').addEventListener('click', () => { calWeekOffset++; renderCalendar(); });
document.getElementById('cal-today').addEventListener('click', () => { calWeekOffset = 0; renderCalendar(); });

// Page Navigation
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('page-' + el.dataset.page).classList.add('active');
  });
});

init();
</script>
</body>
</html>
