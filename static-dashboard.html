<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donna CRM — DBDO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #111318; font-size: 15px; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #111318; color: #fff; padding: 20px 0; overflow-y: auto; }
.sidebar h1 { font-size: 18px; font-weight: 700; padding: 0 20px 20px; border-bottom: 1px solid #2a2d35; }
.sidebar h1 span { color: #f5c542; }
.nav-item { display: flex; align-items: center; padding: 12px 20px; color: #9ca3af; text-decoration: none; transition: all .2s; cursor: pointer; }
.nav-item:hover, .nav-item.active { background: #1e2028; color: #fff; }
.nav-item.active { border-right: 3px solid #f5c542; }
.main { margin-left: 240px; padding: 24px; }
.header { margin-bottom: 24px; }
.header h2 { font-size: 24px; font-weight: 700; }
.header p { color: #6b7280; margin-top: 4px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.stat-card .label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .value.gold { color: #f5c542; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }
.task-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
.task-item:last-child { border-bottom: none; }
.task-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
.task-dot.red { background: #ef4444; }
.task-dot.yellow { background: #f59e0b; }
.task-dot.green { background: #10b981; }
.task-dot.blue { background: #3b82f6; }
.client-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
.client-row:last-child { border-bottom: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.active { background: #d1fae5; color: #065f46; }
.badge.retainer { background: #dbeafe; color: #1e40af; }
.event-item { padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
.event-item:last-child { border-bottom: none; }
.event-time { font-size: 12px; color: #6b7280; }
.section { display: none; }
.section.active { display: block; }
#loading { text-align: center; padding: 60px; font-size: 18px; color: #6b7280; }
@media (max-width: 768px) { .sidebar { width: 60px; } .sidebar h1, .nav-text { display: none; } .main { margin-left: 60px; } .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="sidebar">
  <h1><span>D</span> Donna CRM</h1>
  <a class="nav-item active" data-page="dashboard">📊 <span class="nav-text">Dashboard</span></a>
  <a class="nav-item" data-page="clients">👥 <span class="nav-text">Clients</span></a>
  <a class="nav-item" data-page="tasks">✅ <span class="nav-text">Tasks</span></a>
  <a class="nav-item" data-page="calendar">📅 <span class="nav-text">Calendar</span></a>
  <a class="nav-item" data-page="contacts">📇 <span class="nav-text">Contacts</span></a>
</div>
<div class="main">
  <div id="loading">Loading CRM data...</div>
  <div id="content" style="display:none">
    <div class="section active" id="page-dashboard">
      <div class="header">
        <h2>Dashboard</h2>
        <p>Welcome back, David</p>
      </div>
      <div class="stats" id="stats-grid"></div>
      <div class="cards">
        <div class="card"><h3>📋 Active Tasks</h3><div id="tasks-list"></div></div>
        <div class="card"><h3>📅 Upcoming Events</h3><div id="events-list"></div></div>
      </div>
      <div class="cards">
        <div class="card"><h3>👥 Recent Clients</h3><div id="clients-preview"></div></div>
      </div>
    </div>
    <div class="section" id="page-clients">
      <div class="header"><h2>Clients</h2><p id="client-count"></p></div>
      <div class="cards" id="clients-grid"></div>
    </div>
    <div class="section" id="page-tasks">
      <div class="header"><h2>Tasks</h2></div>
      <div class="card"><div id="all-tasks"></div></div>
    </div>
    <div class="section" id="page-calendar">
      <div class="header"><h2>Calendar</h2></div>
      <div class="card"><div id="all-events"></div></div>
    </div>
    <div class="section" id="page-contacts">
      <div class="header"><h2>Contacts</h2><p id="contact-count"></p></div>
      <div class="card"><div id="all-contacts"></div></div>
    </div>
  </div>
</div>
<script>
const API = '/api';
let TOKEN = '';

async function init() {
  // Auto-login
  try {
    const res = await fetch(API + '/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password:'Oralevich101!'}) });
    const data = await res.json();
    TOKEN = data.token || '';
  } catch(e) {}

  const headers = TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {};
  const get = async (path) => {
    try {
      const r = await fetch(API + path, { headers });
      const ct = r.headers.get('content-type') || '';
      if (ct.includes('json')) return r.json();
    } catch(e) {}
    // Fallback to static data
    try { const r2 = await fetch('/data' + path + '.json'); if(r2.ok) return r2.json(); } catch(e) {}
    return null;
  };

  const [stats, clients, tasks, events, contacts] = await Promise.all([
    get('/dashboard/stats'), get('/clients'), get('/tasks'), get('/calendar'), get('/contacts')
  ]);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Stats
  if (stats) {
    document.getElementById('stats-grid').innerHTML = [
      { label: 'Total Clients', value: stats.total_clients || (clients||[]).length },
      { label: 'Active Projects', value: stats.active_projects || 0 },
      { label: 'Open Tasks', value: (tasks||[]).filter(t=>!t.is_completed).length },
      { label: 'Events Today', value: stats.meetings_today || 0 },
    ].map(s => '<div class="stat-card"><div class="label">'+s.label+'</div><div class="value'+(s.label.includes('Client')?' gold':'')+'">'+s.value+'</div></div>').join('');
  }

  // Tasks
  const taskHTML = (list, limit) => (list||[]).filter(t=>!t.is_completed).slice(0,limit||10).map(t =>
    '<div class="task-item"><div class="task-dot '+(t.priority==4?'red':t.priority==3?'yellow':'blue')+'"></div><div><div>'+t.content+'</div><div style="font-size:12px;color:#6b7280">'+(t.project_name||'')+'</div></div></div>'
  ).join('') || '<p style="color:#6b7280;padding:8px 0">No tasks</p>';

  document.getElementById('tasks-list').innerHTML = taskHTML(tasks, 8);
  document.getElementById('all-tasks').innerHTML = taskHTML(tasks, 100);

  // Events
  const eventHTML = (list, limit) => (list||[]).slice(0,limit||10).map(e =>
    '<div class="event-item"><div>'+e.summary+'</div><div class="event-time">'+(e.start?.dateTime ? new Date(e.start.dateTime).toLocaleString() : e.start?.date || '')+'</div></div>'
  ).join('') || '<p style="color:#6b7280;padding:8px 0">No events</p>';

  document.getElementById('events-list').innerHTML = eventHTML(events, 5);
  document.getElementById('all-events').innerHTML = eventHTML(events, 50);

  // Clients
  const clientHTML = (list, limit) => (list||[]).slice(0,limit||50).map(c =>
    '<div class="client-row"><div><strong>'+c.name+'</strong><div style="font-size:12px;color:#6b7280">'+(c.contact_email||c.todoist_project_id||'')+'</div></div><span class="badge '+(c.type||'active')+'">'+((c.type||'active').charAt(0).toUpperCase()+(c.type||'active').slice(1))+'</span></div>'
  ).join('') || '<p style="color:#6b7280;padding:8px 0">No clients</p>';

  document.getElementById('clients-preview').innerHTML = clientHTML(clients, 8);
  document.getElementById('client-count').textContent = (clients||[]).length + ' clients';
  document.getElementById('clients-grid').innerHTML = '<div class="card">' + clientHTML(clients, 100) + '</div>';

  // Contacts
  const contactHTML = (contacts||[]).slice(0,50).map(c =>
    '<div class="client-row"><div><strong>'+(c.name||c.display_name||'Unknown')+'</strong><div style="font-size:12px;color:#6b7280">'+(c.email||'')+(c.phone?' · '+c.phone:'')+'</div></div></div>'
  ).join('') || '<p style="color:#6b7280;padding:8px 0">No contacts loaded</p>';

  document.getElementById('contact-count').textContent = (contacts||[]).length + ' contacts';
  document.getElementById('all-contacts').innerHTML = contactHTML;
}

// Navigation
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('page-' + el.dataset.page).classList.add('active');
  });
});

init();
</script>
</body>
</html>
